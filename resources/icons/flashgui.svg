<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="FlashGUI icon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1A24"/>
      <stop offset="100%" stop-color="#182B3A"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#168A63"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="12" y="12" width="232" height="232" rx="44" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="224" height="224" rx="40" fill="none" stroke="#2B465B" stroke-width="2"/>

  <!-- Subtle GUI window -->
  <rect x="56" y="54" width="144" height="110" rx="14" fill="#0F2333" stroke="#2E516A" stroke-width="2"/>
  <rect x="56" y="54" width="144" height="22" rx="14" fill="#1E3B50"/>
  <circle cx="72" cy="65" r="4" fill="#EF4444"/>
  <circle cx="86" cy="65" r="4" fill="#F59E0B"/>
  <circle cx="100" cy="65" r="4" fill="#22C55E"/>
  <rect x="68" y="88" width="120" height="8" rx="4" fill="#2A4D63"/>
  <rect x="68" y="104" width="94" height="8" rx="4" fill="#2A4D63"/>
  <rect x="68" y="120" width="72" height="8" rx="4" fill="#2A4D63"/>

  <!-- Chip body -->
  <rect x="76" y="136" width="104" height="82" rx="14" fill="url(#chipGrad)" stroke="#0E6B4D" stroke-width="2"/>
  <rect x="104" y="160" width="48" height="34" rx="6" fill="#0B5D43" opacity="0.8"/>

  <!-- Chip pins -->
  <g fill="#B8C1C7">
    <rect x="68" y="148" width="8" height="6" rx="2"/>
    <rect x="68" y="162" width="8" height="6" rx="2"/>
    <rect x="68" y="176" width="8" height="6" rx="2"/>
    <rect x="68" y="190" width="8" height="6" rx="2"/>

    <rect x="180" y="148" width="8" height="6" rx="2"/>
    <rect x="180" y="162" width="8" height="6" rx="2"/>
    <rect x="180" y="176" width="8" height="6" rx="2"/>
    <rect x="180" y="190" width="8" height="6" rx="2"/>
  </g>

  <!-- Flash bolt -->
  <path
    d="M141 95 L116 136 H132 L116 172 L154 126 H136 L151 95 Z"
    fill="url(#boltGrad)"
    stroke="#D97706"
    stroke-width="2"
    filter="url(#softGlow)"
  />
</svg>
